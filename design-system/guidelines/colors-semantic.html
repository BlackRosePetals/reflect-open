<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-app); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile { border-radius: var(--radius-lg); padding: 12px; box-shadow: inset 0 0 0 1px var(--border); display:flex; flex-direction:column; gap:8px; }
  .dot { width: 22px; height: 22px; border-radius: var(--radius-full); box-shadow: inset 0 0 0 1px rgba(11,19,36,.08); }
  .lbl { font-size: 12px; font-weight: 500; color: var(--text); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile" style="background:var(--accent)"><div class="lbl" style="color:#fff">Accent</div><div class="tok" style="color:rgba(255,255,255,.7)">--accent</div></div>
    <div class="tile" style="background:var(--accent-soft)"><div class="lbl" style="color:var(--accent-soft-text)">Accent soft</div><div class="tok" style="color:var(--accent-soft-text)">--accent-soft</div></div>
    <div class="tile"><div class="dot" style="background:var(--destructive)"></div><div class="lbl">Destructive</div><div class="tok">--red-500</div></div>
    <div class="tile"><div class="dot" style="background:var(--green-500)"></div><div class="lbl">Success</div><div class="tok">--green-500</div></div>
  </div>
</body>
</html>
