<!-- @dsCard group="Colors" viewport="700x160" name="Marketing · Deep space" subtitle="Near-black canvas lit by purple glow & glass" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; }
  .stage { padding: 20px; background: var(--space-black); position: relative; overflow: hidden; }
  .stage::before { content:""; position:absolute; inset:0; background: radial-gradient(40% 90% at 50% -10%, rgba(148,101,255,.22) 0%, rgba(3,0,20,0) 70%); pointer-events:none; }
  .row { display: flex; gap: 10px; position: relative; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--radius-lg); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
  .name { font-family: var(--font-sans); font-size: 11px; font-weight: var(--weight-medium); color: #fff; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,.5); }
  .glassbtn { display:flex; align-items:center; justify-content:center; height:56px; border-radius: var(--radius-lg); color: var(--purple-text); font-family: var(--font-sans); font-size:12px; font-weight:500; background: linear-gradient(180deg,rgba(60,8,126,0) 0%,rgba(60,8,126,.32) 100%),rgba(113,47,255,.12); box-shadow: inset 0 0 12px rgba(191,151,255,.24), inset 0 0 0 1px rgba(207,184,255,.24); }
</style>
</head>
<body>
  <div class="stage">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--space-black)"></div><span class="name">Space black</span><span class="hex">#030014</span></div>
      <div class="sw"><div class="chip" style="background:var(--purple-glow)"></div><span class="name">Purple glow</span><span class="hex">#712FFF</span></div>
      <div class="sw"><div class="chip" style="background:var(--purple-light)"></div><span class="name">Purple light</span><span class="hex">#9465FF</span></div>
      <div class="sw"><div class="chip" style="background:var(--purple-haze)"></div><span class="name">Purple haze</span><span class="hex">#CFB8FF</span></div>
      <div class="sw"><div class="glassbtn">Start free trial</div><span class="name">Glass button</span><span class="hex">+ inset glow</span></div>
    </div>
  </div>
</body>
</html>
